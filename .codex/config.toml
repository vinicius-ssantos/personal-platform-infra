model = "gpt-5.5"
# Token economy: match effort to task complexity.
#   - "low"    → trivial edits, smokes, renames, config bumps
#   - "medium" → default; manifests, overlays, scripts, most infra work
#   - "high"   → migrations, ADRs, cross-service refactors (override per-session
#                with `codex --model-reasoning-effort high`)
# See AGENTS.md "Token Economy Across Tools".
model_reasoning_effort = "medium"

approval_policy = "on-request"
sandbox_mode = "workspace-write"
network_access = false

[history]
persistence = "none"

[agents]
max_threads = 4
max_depth = 1

[profiles.project-edit]
default_permissions = "project-edit"
project_doc_fallback_filenames = ["AGENTS.md", ".AGENTS.md"]

[profiles.project-edit.permissions]
read = "all"
write = "project"
network = false

[profiles.project-edit.permissions.paths]
".env" = "deny"
".env.*" = "deny"
".mcp.json" = "deny"
"opencode.local.json" = "deny"
".kube" = "deny"
".k3d" = "deny"
".age" = "deny"
"secrets" = "deny"
"node_modules" = "deny"
".opencode/node_modules" = "deny"
".pytest_cache" = "deny"
".sandbox" = "deny"
"dist" = "deny"
".wrangler" = "deny"
".tmp-*" = "deny"
"*.log" = "deny"
