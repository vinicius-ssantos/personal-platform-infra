services:
  github-unified-mcp:
    image: ${GITHUB_UNIFIED_MCP_IMAGE}
    profiles: ["github", "tailscale", "all"]
    ports:
      # Bind to 127.0.0.1 so ports are not exposed on the WSL2 network
      # adapter or any LAN interface. Access via http://localhost:<port>.
      - "127.0.0.1:8765:8765"
    environment:
      FASTMCP_HOST: 0.0.0.0
      FASTMCP_PORT: 8765
      FASTMCP_ALLOWED_HOSTS: github-unified-mcp:8765,localhost:8765,127.0.0.1:8765
      MCP_AUTH_ENABLED: "true"
      MCP_AUTH_MODE: bearer
      MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_ALLOWED_REPOS: ${GITHUB_ALLOWED_REPOS}
      GITHUB_REQUIRE_ALLOWED_REPOS: "true"
      GITHUB_READ_ONLY: "false"
      HTTPS_PROXY: ${WARP_PROXY:-}
      HTTP_PROXY: ${WARP_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,github-unified-mcp
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  deploy-orchestrator-mcp:
    image: ${DEPLOY_ORCHESTRATOR_MCP_IMAGE}
    profiles: ["deploy", "tailscale", "all"]
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      MCP_TRANSPORT: http
      PORT: 8000
      MCP_SERVER_API_KEY: ${MCP_SERVER_API_KEY}
      MCP_READ_ONLY: "true"
      MCP_REQUIRE_CONFIRMATION: "true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  mcp-social:
    image: ${MCP_SOCIAL_IMAGE}
    profiles: ["social", "tailscale", "all"]
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SOCIAL_MCP_ACCESS_TOKEN: ${SOCIAL_MCP_ACCESS_TOKEN}
      SOCIAL_DB_URL: sqlite+aiosqlite:////data/social.db
    volumes:
      - social-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  github-unified-mcp-bff:
    image: ${GITHUB_UNIFIED_MCP_BFF_IMAGE}
    profiles: ["github-bff", "all"]
    ports:
      - "127.0.0.1:8010:8000"
    environment:
      BFF_ENV: development
      FRONTEND_URL: http://localhost:5173
      ALLOWED_ORIGINS: http://localhost:5173
      MCP_URL: http://github-unified-mcp:8765
      MCP_TOKEN: ${MCP_BEARER_TOKEN}
      COOKIE_SECURE: "false"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  vos-studio-mcp:
    image: ${VOS_STUDIO_MCP_IMAGE}
    profiles: ["vos", "tailscale", "all"]
    ports:
      - "127.0.0.1:8020:8000"
    environment:
      APP_ENV: development
      MCP_SERVER_HOST: 0.0.0.0
      MCP_SERVER_PORT: 8000
      PORT: 8000
      MCP_PUBLIC_BASE_URL: http://vos-studio-mcp:8000
    healthcheck:
      # Temporary liveness proxy until vos-studio-mcp exposes a lightweight /live endpoint.
      # /health performs dependency diagnostics and can be slower when DB/Redis/Celery are absent locally.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=10).read()\""]
      interval: 10s
      timeout: 12s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  vos-studio-bff:
    image: ${VOS_STUDIO_BFF_IMAGE}
    profiles: ["vos", "all"]
    ports:
      - "127.0.0.1:8030:8000"
    environment:
      BFF_ENV: development
      FRONTEND_URL: http://localhost:5174
      ALLOWED_ORIGINS: http://localhost:5174
      MCP_URL: http://vos-studio-mcp:8000
      COOKIE_SECURE: "false"
      PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Scoped Docker API access for mcp-code-sandbox (which executes arbitrary
  # user-submitted code). The sandbox server only ever needs to create/start/
  # kill/remove/log containers and manage its own scratch volumes — never
  # exec into other containers, build/pull images, touch networks, or any
  # Swarm/secrets/system endpoint. Mounting the raw host docker.sock instead
  # would hand the sandbox process unrestricted, root-equivalent control over
  # every container and the daemon itself; this proxy is the least-privilege
  # alternative (see image-pinning.md for why we don't grant group_add: ["0"]
  # here). POST=1 is the proxy's global write gate — without it every
  # resource flag below is read-only regardless of value.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    profiles: ["sandbox", "gateway", "tailscale", "all"]
    environment:
      CONTAINERS: 1
      VOLUMES: 1
      PING: 1
      POST: 1
      IMAGES: 0
      EXEC: 0
      NETWORKS: 0
      BUILD: 0
      COMMIT: 0
      SERVICES: 0
      SWARM: 0
      SECRETS: 0
      NODES: 0
      PLUGINS: 0
      CONFIGS: 0
      TASKS: 0
      SYSTEM: 0
      DISTRIBUTION: 0
      AUTH: 0
      SESSION: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  mcp-code-sandbox-images:
    image: docker:27-cli
    profiles: ["sandbox", "gateway", "tailscale", "all"]
    command:
      - sh
      - -ec
      - |
        all_exist=true
        for img in mcp-sandbox-python:local mcp-sandbox-node:local mcp-sandbox-java:local; do
          docker image inspect "$$img" > /dev/null 2>&1 || { all_exist=false; break; }
        done
        if [ "$$all_exist" = "true" ]; then
          echo "Sandbox images already present, skipping build."; exit 0
        fi
        docker build -f /sandbox/images/Dockerfile.python -t mcp-sandbox-python:local /sandbox
        docker build -f /sandbox/images/Dockerfile.node -t mcp-sandbox-node:local /sandbox
        docker build -f /sandbox/images/Dockerfile.java -t mcp-sandbox-java:local /sandbox
    volumes:
      - ${MCP_CODE_SANDBOX_REPO_PATH:-../mcp-code-sandbox}:/sandbox:ro
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"

  mcp-code-sandbox:
    build:
      context: ${MCP_CODE_SANDBOX_REPO_PATH:-../mcp-code-sandbox}
      dockerfile: Dockerfile.server
    image: mcp-code-sandbox-server:local
    pull_policy: never
    profiles: ["sandbox", "gateway", "tailscale", "all"]
    ports:
      - "127.0.0.1:8766:8766"
    environment:
      # Talk to the Docker daemon through docker-socket-proxy instead of
      # mounting /var/run/docker.sock directly — see the proxy service
      # comment above. docker.from_env() in the Python SDK picks this up
      # automatically.
      DOCKER_HOST: tcp://docker-socket-proxy:2375
      SANDBOX_API_KEY: ${SANDBOX_API_KEY}
      SANDBOX_TRANSPORT: streamable-http
      SANDBOX_HOST: 0.0.0.0
      SANDBOX_PORT: 8766
      SANDBOX_ALLOWED_HOSTS: mcp-code-sandbox:8766,localhost:8766,127.0.0.1:8766,host.docker.internal:8766
      SANDBOX_LOG_LEVEL: INFO
      SANDBOX_MAX_OUTPUT_BYTES: ${SANDBOX_MAX_OUTPUT_BYTES:-1048576}
      SANDBOX_MAX_PROJECT_FILES: ${SANDBOX_MAX_PROJECT_FILES:-64}
      SANDBOX_MAX_PROJECT_BYTES: ${SANDBOX_MAX_PROJECT_BYTES:-8388608}
      SANDBOX_MAX_ENV_VARS: ${SANDBOX_MAX_ENV_VARS:-32}
      SANDBOX_MAX_OUTPUT_FILES: ${SANDBOX_MAX_OUTPUT_FILES:-16}
      SANDBOX_MAX_CONCURRENT: ${SANDBOX_MAX_CONCURRENT:-4}
      SANDBOX_QUEUE_TIMEOUT_SECONDS: ${SANDBOX_QUEUE_TIMEOUT_SECONDS:-30}
      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-30}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-256m}
      SANDBOX_CPU_PERIOD: ${SANDBOX_CPU_PERIOD:-100000}
      SANDBOX_CPU_QUOTA: ${SANDBOX_CPU_QUOTA:-50000}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-128}
    depends_on:
      docker-socket-proxy:
        condition: service_started
      mcp-code-sandbox-images:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost', 8766), timeout=3); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["gateway", "workflow-engine", "tailscale", "all"]
    command: redis-server --save "" --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  postgres-workflow-engine:
    image: postgres:17-alpine
    profiles: ["workflow-engine", "all"]
    environment:
      POSTGRES_DB: workflow_engine
      POSTGRES_USER: workflow
      POSTGRES_PASSWORD: workflow
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflow -d workflow_engine"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - postgres-workflow-engine-data:/var/lib/postgresql/data
    restart: unless-stopped

  workflow-engine:
    image: ${WORKFLOW_ENGINE_IMAGE:-ghcr.io/vinicius-ssantos/workflow-engine:main}
    profiles: ["workflow-engine", "all"]
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: jpa
      DATABASE_URL: jdbc:postgresql://postgres-workflow-engine:5432/workflow_engine
      DATABASE_USERNAME: workflow
      DATABASE_PASSWORD: workflow
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: ${WORKFLOW_ENGINE_KAFKA_BOOTSTRAP_SERVERS:-}
    depends_on:
      postgres-workflow-engine:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Alpine BusyBox wget: --spider não suportado. Usar wget -q -O /dev/null.
      test: ["CMD-SHELL", "wget -q http://localhost:8080/actuator/health -O /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

  repo-research-sidecar:
    image: ${REPO_RESEARCH_SIDECAR_IMAGE}
    profiles: ["gateway", "tailscale", "all"]
    environment:
      MCP_TRANSPORT: streamable-http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8081"
      FASTMCP_ALLOWED_HOSTS: repo-research-sidecar:8081,localhost:8081,127.0.0.1:8081
      REPO_RESEARCH_ALLOWED_REPOSITORIES: ${REPO_RESEARCH_ALLOWED_REPOSITORIES}
      REPO_RESEARCH_GITHUB_TOKEN: ${REPO_RESEARCH_GITHUB_TOKEN}
      REPO_RESEARCH_MAX_FETCH_BYTES: "100000"
      REPO_RESEARCH_CACHE_TTL_SECONDS: "300"
      HTTPS_PROXY: ${WARP_PROXY:-}
      HTTP_PROXY: ${WARP_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,repo-research-sidecar
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 8081)); s.close()\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  job-hunter-scheduler:
    image: ${JOB_HUNTER_IMAGE:-ghcr.io/vinicius-ssantos/jobhunteragent:main}
    profiles: ["job-hunter"]
    environment:
      JOB_HUNTER_TELEGRAM_TOKEN: ${JOB_HUNTER_TELEGRAM_TOKEN}
      JOB_HUNTER_TELEGRAM_CHAT_ID: ${JOB_HUNTER_TELEGRAM_CHAT_ID}
      JOB_HUNTER_DATABASE_PATH: /app/data/jobs.db
      JOB_HUNTER_BROWSER_USE_CONFIG_DIR: /app/.browseruse
      JOB_HUNTER_LINKEDIN_PERSISTENT_PROFILE_DIR: /app/.browseruse/profiles/linkedin-bootstrap
      JOB_HUNTER_LINKEDIN_STORAGE_STATE_PATH: /app/.browseruse/linkedin-storage-state.json
      JOB_HUNTER_FAILURE_ARTIFACTS_DIR: /app/.artifacts/linkedin_failures
      JOB_HUNTER_OLLAMA_URL: ${JOB_HUNTER_OLLAMA_URL:-http://host.docker.internal:11434}
      JOB_HUNTER_CANDIDATE_PROFILE_PATH: ${JOB_HUNTER_CANDIDATE_PROFILE_PATH:-/app/config/candidate_profile.json}
      JOB_HUNTER_SKILL_TAXONOMY_PATH: /app/config/skill_taxonomy.json
      JOB_HUNTER_LINKEDIN_COMPANY_POLICY_PATH: /app/config/linkedin_company_policy.json
      JOB_HUNTER_OPERATIONAL_POLICY_PATH: /app/config/operational_policy.json
      JOB_HUNTER_STRUCTURED_MATCHING_CONFIG_PATH: /app/config/job_target.json
      JOB_HUNTER_COLLECTION_TIME: ${JOB_HUNTER_COLLECTION_TIME:-08:00}
      JOB_HUNTER_BROWSER_HEADLESS: ${JOB_HUNTER_BROWSER_HEADLESS:-true}
    volumes:
      - job-hunter-data:/app/data
      - job-hunter-browseruse:/app/.browseruse
      - job-hunter-artifacts:/app/.artifacts
      - ${JOB_HUNTER_CONFIG_PATH:-./config/job-hunter}:/app/config:ro
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    profiles: ["job-hunter", "ollama"]
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  central-mcp-gateway:
    image: ${CENTRAL_MCP_GATEWAY_IMAGE}
    profiles: ["gateway", "tailscale", "all"]
    ports:
      - "127.0.0.1:8040:8080"
    environment:
      GATEWAY_APP_NAME: central-mcp-gateway
      GATEWAY_ENVIRONMENT: local
      GATEWAY_PUBLIC_BASE_URL: ${CENTRAL_MCP_GATEWAY_PUBLIC_URL}
      GATEWAY_OAUTH_ISSUER: ${CENTRAL_MCP_GATEWAY_PUBLIC_URL}
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8080
      GATEWAY_LOG_LEVEL: info
      GATEWAY_PUBLIC_BEARER_TOKEN: ${CENTRAL_MCP_GATEWAY_PUBLIC_BEARER_TOKEN}
      GATEWAY_OAUTH_CLIENT_ID: chatgpt
      GATEWAY_OAUTH_CLIENT_SECRET: ${CENTRAL_MCP_GATEWAY_OAUTH_CLIENT_SECRET}
      GATEWAY_SESSION_SECRET: ${CENTRAL_MCP_GATEWAY_SESSION_SECRET}
      GATEWAY_OAUTH_ALLOWED_REDIRECT_URIS: ${CENTRAL_MCP_GATEWAY_OAUTH_ALLOWED_REDIRECT_URIS}
      GATEWAY_ADMIN_ENABLED: ${CENTRAL_MCP_GATEWAY_ADMIN_ENABLED}
      GATEWAY_ADMIN_UI_ENABLED: ${CENTRAL_MCP_GATEWAY_ADMIN_UI_ENABLED}
      GATEWAY_DYNAMIC_UPSTREAMS_ENABLED: ${CENTRAL_MCP_GATEWAY_DYNAMIC_UPSTREAMS_ENABLED}
      GATEWAY_ADMIN_TOKEN: ${CENTRAL_MCP_GATEWAY_ADMIN_TOKEN}
      GATEWAY_OAUTH_DEFAULT_SCOPES: gateway:read github:read github:write deploy:read social:write sandbox:run repo:read repo-research:read
      GATEWAY_TOOL_ALLOWLIST: gateway.status,gateway.delivery_status,gateway.upstream_capabilities,gateway.search_discovered_tools,gateway.get_discovered_tool,gateway.invoke_discovered_tool,gateway.propose_catalog_entry,github.search_issues,deploy.get_status,social.create_draft,social.publish_post,social.get_post_status,social.get_post_metrics,social.list_scheduled_posts,social.cancel_scheduled_post,social.update_post_caption,vos.get_studio_status,sandbox.run_code,sandbox.run_file,sandbox.run_command,repo.search,repo.fetch,repo.repository_overview,repo.list_files
      GATEWAY_UPSTREAM_GITHUB_URL: http://github-unified-mcp:8765/mcp
      GATEWAY_UPSTREAM_DEPLOY_URL: http://deploy-orchestrator-mcp:8000/mcp
      GATEWAY_UPSTREAM_SOCIAL_URL: http://mcp-social:8080/mcp/
      GATEWAY_UPSTREAM_VOS_URL: http://vos-studio-mcp:8000/mcp/
      GATEWAY_UPSTREAM_SANDBOX_URL: ${GATEWAY_UPSTREAM_SANDBOX_URL}
      GATEWAY_UPSTREAM_REPO_RESEARCH_URL: http://repo-research-sidecar:8081/mcp
      GATEWAY_MCP_BEARER_TOKEN: ${MCP_BEARER_TOKEN}
      GATEWAY_GITHUB_TOKEN: ${GITHUB_TOKEN}
      GATEWAY_DEPLOY_API_KEY: ${MCP_SERVER_API_KEY}
      GATEWAY_SOCIAL_ACCESS_TOKEN: ${SOCIAL_MCP_ACCESS_TOKEN}
      GATEWAY_SANDBOX_API_KEY: ${SANDBOX_API_KEY}
      GATEWAY_REPO_RESEARCH_API_KEY: ${REPO_RESEARCH_SIDECAR_API_KEY}
      GATEWAY_RATE_LIMIT_PER_TOOL_PER_MINUTE: 20
      GATEWAY_TRUSTED_PROXY_COUNT: 1
      GATEWAY_IDEMPOTENCY_TTL_SECONDS: 300
      # --- Owner Mode (SOMENTE local/DEV) ---
      GATEWAY_OWNER_MODE_ENABLED: "true"
      GATEWAY_OWNER_BEARER_TOKEN: ${GATEWAY_OWNER_BEARER_TOKEN}
      GATEWAY_OWNER_CLIENT_IDS: chatgpt
      GATEWAY_OWNER_ALLOW_DYNAMIC_WRITES: "true"
      GATEWAY_OWNER_ALLOW_EXTERNAL_PUBLICATION: "true"
      GATEWAY_OWNER_DRY_RUN: "false"
      GATEWAY_REDIS_URL: ${GATEWAY_REDIS_URL:-redis://redis:6379/0}
      # DEV ONLY — allows the gateway to call upstream services at private/loopback
      # URLs (the Docker Compose service DNS names). Must NOT be set to "true" in
      # production (k8s): upstream URLs there use cluster-internal DNS which the
      # gateway resolves to ClusterIPs, and enabling this setting would allow SSRF
      # to any internal k8s endpoint. The k8s ConfigMap intentionally omits this key.
      GATEWAY_CONFIRM_CHANNEL: ${GATEWAY_CONFIRM_CHANNEL:-telegram}
      GATEWAY_CONFIRM_TELEGRAM_TOKEN: ${GATEWAY_CONFIRM_TELEGRAM_TOKEN}
      GATEWAY_CONFIRM_TELEGRAM_CHAT_ID: ${GATEWAY_CONFIRM_TELEGRAM_CHAT_ID}
      GATEWAY_ALLOW_PRIVATE_UPSTREAM_URLS: "true"
    depends_on:
      redis:
        condition: service_healthy
      github-unified-mcp:
        condition: service_healthy
      deploy-orchestrator-mcp:
        condition: service_healthy
      mcp-social:
        condition: service_healthy
      vos-studio-mcp:
        condition: service_healthy
      mcp-code-sandbox:
        condition: service_healthy
      repo-research-sidecar:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  tailscale-gateway:
    image: tailscale/tailscale:stable
    profiles: ["tailscale"]
    network_mode: "service:central-mcp-gateway"
    environment:
      TS_AUTHKEY: ${TAILSCALE_AUTHKEY}
      TS_HOSTNAME: ${TAILSCALE_CONTAINER_HOSTNAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_AUTH_ONCE: "true"
      TS_ACCEPT_DNS: "false"
      TS_USERSPACE: "false"
      TS_ENABLE_HEALTH_CHECK: "true"
      TS_LOCAL_ADDR_PORT: 127.0.0.1:9002
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - tailscale-gateway-state:/var/lib/tailscale
    depends_on:
      central-mcp-gateway:
        condition: service_healthy
    restart: unless-stopped

  ngrok-proxy:
    image: caddy:2.8-alpine
    profiles: ["ngrok", "all"]
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      PUBLIC_EDGE_TOKEN: ${PUBLIC_EDGE_TOKEN}
    volumes:
      - ./Caddyfile.ngrok:/etc/caddy/Caddyfile:ro
    depends_on:
      - github-unified-mcp
      - deploy-orchestrator-mcp
      - mcp-social
      - github-unified-mcp-bff
      - vos-studio-mcp
      - vos-studio-bff
      - mcp-code-sandbox
      - central-mcp-gateway
    restart: unless-stopped

volumes:
  social-data:
  tailscale-gateway-state:
  job-hunter-data:
  job-hunter-browseruse:
  job-hunter-artifacts:
  ollama-models:
  postgres-workflow-engine-data:
