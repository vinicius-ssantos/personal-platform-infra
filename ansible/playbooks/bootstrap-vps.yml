---
# Bootstrap VPS for personal platform.
#
# First run: connect as root (Hetzner default) and create the operator user:
#   ansible-playbook -i ansible/inventory/vps.ini bootstrap-vps.yml \
#     -e ansible_user=root -e create_operator_user=true
#
# Subsequent runs: connect as the operator user (ansible_user in inventory):
#   ansible-playbook -i ansible/inventory/vps.ini bootstrap-vps.yml
- name: Bootstrap VPS for personal platform
  hosts: vps
  become: true
  vars_files:
    - ../vars/tool-versions.yml
  vars:
    ufw_public_tcp_ports:
      - "80"
      - "443"
    k3s_api_allowed_cidrs: []
    create_operator_user: false
    operator_user: "{{ ansible_user }}"

  tasks:
    - name: Create operator user with sudo access
      when: create_operator_user | bool
      block:
        - name: Create operator user
          ansible.builtin.user:
            name: "{{ operator_user }}"
            shell: /bin/bash
            groups: sudo
            append: true
            create_home: true

        - name: Add operator SSH key
          ansible.posix.authorized_key:
            user: "{{ operator_user }}"
            key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

        - name: Allow passwordless sudo for platform management commands
          ansible.builtin.copy:
            # Restricted to commands needed for day-to-day VPS operation.
            # Full root escalation (e.g. Ansible bootstrap itself) still works
            # because bootstrap runs as root (first run) or via become: true
            # against a password-bearing session. NOPASSWD:ALL is intentionally
            # avoided to limit blast radius if the operator account is compromised.
            content: "{{ operator_user }} ALL=(ALL) NOPASSWD: /bin/systemctl, /usr/bin/systemctl, /usr/local/bin/k3s, /usr/bin/apt-get, /usr/bin/apt, /usr/sbin/ufw\n"
            dest: "/etc/sudoers.d/90-{{ operator_user }}"
            mode: "0440"
            validate: visudo -cf %s

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - jq
          - ufw
          - fail2ban
          - age
        state: present
        update_cache: true

    - name: Create platform directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/personal-platform
        - /opt/personal-platform/data
        - /opt/personal-platform/backups
        - /opt/personal-platform/logs

    # INSTALL_K3S_VERSION pins the release; the get.k3s.io script verifies the
    # binary's sha256 against the release manifest before installing.
    - name: Install k3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="{{ k3s_version }}" sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s kubeconfig
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 60

    - name: Create .kube directory for operator user
      ansible.builtin.file:
        path: "{{ ansible_user_dir }}/.kube"
        state: directory
        mode: "0700"
        owner: "{{ operator_user }}"
        group: "{{ operator_user }}"

    - name: Copy k3s kubeconfig for operator user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ ansible_user_dir }}/.kube/config"
        remote_src: true
        mode: "0600"
        owner: "{{ operator_user }}"
        group: "{{ operator_user }}"

    - name: Patch kubeconfig server address with public IP
      ansible.builtin.replace:
        path: "{{ ansible_user_dir }}/.kube/config"
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"

    - name: Install platform tooling (just + sops only)
      ansible.builtin.include_role:
        name: platform-tools
      vars:
        install_kubectl: false
        install_k3d: false
        install_helm: false

    - name: Enable UFW with default deny
      community.general.ufw:
        state: enabled
        default: deny

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow public HTTP/HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop: "{{ ufw_public_tcp_ports }}"

    - name: Allow k3s API only from configured admin CIDRs
      community.general.ufw:
        rule: allow
        port: "6443"
        proto: tcp
        from_ip: "{{ item }}"
      loop: "{{ k3s_api_allowed_cidrs }}"

    - name: Harden SSH configuration
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config.d/99-hardening.conf
        create: true
        mode: "0644"
        block: |
          PermitRootLogin no
          PasswordAuthentication no
          ChallengeResponseAuthentication no
          X11Forwarding no
          AllowAgentForwarding no
          MaxAuthTries 3
          LoginGraceTime 30
          ClientAliveInterval 300
          ClientAliveCountMax 2
      notify: Restart sshd

    - name: Enable fail2ban
      ansible.builtin.service:
        name: fail2ban
        enabled: true
        state: started

    - name: Print next steps
      ansible.builtin.debug:
        msg:
          - "Bootstrap complete."
          - "Export VPS_KUBECONFIG for GitHub Actions:"
          - "  ssh {{ operator_user }}@{{ ansible_host }} 'cat ~/.kube/config' | base64 -w0"
          - "Then add the output as the VPS_KUBECONFIG secret in your GitHub repository settings."
          - "Run GHCR pull secret creation before waking workloads:"
          - "  GHCR_USERNAME=<user> GHCR_TOKEN=<token> just create-ghcr-secret"

  handlers:
    - name: Restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted
