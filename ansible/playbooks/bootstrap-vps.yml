---
- name: Bootstrap VPS for personal platform
  hosts: vps
  become: true

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - git
          - gnupg
          - jq
          - ufw
          - fail2ban
          - age
        state: present
        update_cache: true

    - name: Create platform directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/personal-platform
        - /opt/personal-platform/data
        - /opt/personal-platform/backups
        - /opt/personal-platform/logs

    - name: Install k3s
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for k3s kubeconfig
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        timeout: 60

    - name: Create .kube directory for operator user
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.kube"
        state: directory
        mode: "0700"

    - name: Copy k3s kubeconfig for operator user
      ansible.builtin.copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ ansible_env.HOME }}/.kube/config"
        remote_src: true
        mode: "0600"

    - name: Install just
      ansible.builtin.shell: |
        curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
          | bash -s -- --to /usr/local/bin
      args:
        creates: /usr/local/bin/just

    - name: Install sops
      ansible.builtin.shell: |
        VER=$(curl -fsSL https://api.github.com/repos/getsops/sops/releases/latest \
          | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        curl -fsSL "https://github.com/getsops/sops/releases/download/v${VER}/sops-v${VER}.linux.amd64" \
          -o /usr/local/bin/sops
        chmod +x /usr/local/bin/sops
      args:
        creates: /usr/local/bin/sops

    - name: Enable UFW with default deny
      community.general.ufw:
        state: enabled
        default: deny

    - name: Allow SSH through UFW
      community.general.ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTPS through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "80"
        - "443"
        - "6443"
