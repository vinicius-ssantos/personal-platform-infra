---
- name: Install local tooling
  hosts: local
  connection: local
  become: true

  tasks:
    - name: Install common CLI dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
          - jq
          - unzip
          - gnupg
          - age
        state: present
        update_cache: true

    - name: Add HashiCorp GPG key
      ansible.builtin.shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg \
          | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Terraform
      ansible.builtin.apt:
        name: terraform
        state: present
        update_cache: true

    - name: Install kubectl
      ansible.builtin.shell: |
        VER=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
        curl -fsSL "https://dl.k8s.io/release/${VER}/bin/linux/amd64/kubectl" \
          -o /usr/local/bin/kubectl
        chmod +x /usr/local/bin/kubectl
      args:
        creates: /usr/local/bin/kubectl

    - name: Install k3d
      ansible.builtin.shell: |
        curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      args:
        creates: /usr/local/bin/k3d

    - name: Install Helm
      ansible.builtin.shell: |
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Add Cloudflare GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
          | gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
      args:
        creates: /usr/share/keyrings/cloudflare-main.gpg

    - name: Add Cloudflare apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main"
        state: present
        filename: cloudflared

    - name: Install cloudflared
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: true

    - name: Install just
      ansible.builtin.shell: |
        curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh \
          | bash -s -- --to /usr/local/bin
      args:
        creates: /usr/local/bin/just

    - name: Install sops
      ansible.builtin.shell: |
        VER=$(curl -fsSL https://api.github.com/repos/getsops/sops/releases/latest \
          | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        curl -fsSL "https://github.com/getsops/sops/releases/download/v${VER}/sops-v${VER}.linux.amd64" \
          -o /usr/local/bin/sops
        chmod +x /usr/local/bin/sops
      args:
        creates: /usr/local/bin/sops
