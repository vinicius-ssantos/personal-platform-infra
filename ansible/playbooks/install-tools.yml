---
- name: Install local tooling
  hosts: local
  connection: local
  become: true
  vars_files:
    - ../vars/tool-versions.yml

  tasks:
    - name: Install common CLI dependencies
      ansible.builtin.apt:
        name:
          - curl
          - git
          - jq
          - unzip
          - gnupg
          - age
        state: present
        update_cache: true

    - name: Add HashiCorp GPG key
      ansible.builtin.shell: |
        curl -fsSL https://apt.releases.hashicorp.com/gpg \
          | gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/hashicorp-archive-keyring.gpg

    - name: Add HashiCorp apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present
        filename: hashicorp

    - name: Install Terraform
      ansible.builtin.apt:
        name: terraform
        state: present
        update_cache: true

    - name: Install kubectl (checksum-verified)
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        checksum: "sha256:{{ kubectl_sha256 }}"
        mode: "0755"

    - name: Install k3d (checksum-verified)
      ansible.builtin.get_url:
        url: "https://github.com/k3d-io/k3d/releases/download/{{ k3d_version }}/k3d-linux-amd64"
        dest: /usr/local/bin/k3d
        checksum: "sha256:{{ k3d_sha256 }}"
        mode: "0755"

    - name: Download Helm archive (checksum-verified)
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        checksum: "sha256:{{ helm_sha256 }}"
        mode: "0644"

    - name: Install Helm
      ansible.builtin.unarchive:
        src: /tmp/helm.tar.gz
        dest: /usr/local/bin
        remote_src: true
        extra_opts:
          - --strip-components=1
        include:
          - linux-amd64/helm
        mode: "0755"
        creates: /usr/local/bin/helm

    - name: Add Cloudflare GPG key
      ansible.builtin.shell: |
        curl -fsSL https://pkg.cloudflare.com/cloudflare-main.gpg \
          | gpg --dearmor -o /usr/share/keyrings/cloudflare-main.gpg
      args:
        creates: /usr/share/keyrings/cloudflare-main.gpg

    - name: Add Cloudflare apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main"
        state: present
        filename: cloudflared

    - name: Install cloudflared
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: true

    - name: Download just archive (checksum-verified)
      ansible.builtin.get_url:
        url: "https://github.com/casey/just/releases/download/{{ just_version }}/just-{{ just_version }}-x86_64-unknown-linux-musl.tar.gz"
        dest: /tmp/just.tar.gz
        checksum: "sha256:{{ just_sha256 }}"
        mode: "0644"

    - name: Install just
      ansible.builtin.unarchive:
        src: /tmp/just.tar.gz
        dest: /usr/local/bin
        remote_src: true
        include:
          - just
        mode: "0755"
        creates: /usr/local/bin/just

    - name: Install sops (checksum-verified)
      ansible.builtin.get_url:
        url: "https://github.com/getsops/sops/releases/download/{{ sops_version }}/sops-{{ sops_version }}.linux.amd64"
        dest: /usr/local/bin/sops
        checksum: "sha256:{{ sops_sha256 }}"
        mode: "0755"
