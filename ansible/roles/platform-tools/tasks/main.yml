---
# Install platform CLI binaries. Each tool is guarded by a boolean flag so
# callers can opt out of tools that are irrelevant to the target machine.
# All version variables are expected from ansible/vars/tool-versions.yml,
# which the calling playbook must include via vars_files.

- name: Install kubectl (checksum-verified)
  when: install_kubectl | default(true) | bool
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    checksum: "sha256:{{ kubectl_sha256 }}"
    mode: "0755"

- name: Install k3d (checksum-verified)
  when: install_k3d | default(true) | bool
  ansible.builtin.get_url:
    url: "https://github.com/k3d-io/k3d/releases/download/{{ k3d_version }}/k3d-linux-amd64"
    dest: /usr/local/bin/k3d
    checksum: "sha256:{{ k3d_sha256 }}"
    mode: "0755"

- name: Download Helm archive (checksum-verified)
  when: install_helm | default(true) | bool
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: /tmp/helm.tar.gz
    checksum: "sha256:{{ helm_sha256 }}"
    mode: "0644"

- name: Install Helm
  when: install_helm | default(true) | bool
  ansible.builtin.unarchive:
    src: /tmp/helm.tar.gz
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
    include:
      - linux-amd64/helm
    mode: "0755"
    creates: /usr/local/bin/helm

- name: Download just archive (checksum-verified)
  when: install_just | default(true) | bool
  ansible.builtin.get_url:
    url: "https://github.com/casey/just/releases/download/{{ just_version }}/just-{{ just_version }}-x86_64-unknown-linux-musl.tar.gz"
    dest: /tmp/just.tar.gz
    checksum: "sha256:{{ just_sha256 }}"
    mode: "0644"

- name: Install just
  when: install_just | default(true) | bool
  ansible.builtin.unarchive:
    src: /tmp/just.tar.gz
    dest: /usr/local/bin
    remote_src: true
    include:
      - just
    mode: "0755"
    creates: /usr/local/bin/just

- name: Install sops (checksum-verified)
  when: install_sops | default(true) | bool
  ansible.builtin.get_url:
    url: "https://github.com/getsops/sops/releases/download/{{ sops_version }}/sops-{{ sops_version }}.linux.amd64"
    dest: /usr/local/bin/sops
    checksum: "sha256:{{ sops_sha256 }}"
    mode: "0755"
