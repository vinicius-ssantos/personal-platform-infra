[vps]
# Replace 203.0.113.10 with the ipv4_address from: just terraform-vps-apply
#
# First run (fresh Hetzner server — connects as root, creates operator user):
#   ansible-playbook -i ansible/inventory/vps.ini ansible/playbooks/bootstrap-vps.yml \
#     -e ansible_user=root -e create_operator_user=true
#
# Subsequent runs (connects as the ansible_user below):
#   ansible-playbook -i ansible/inventory/vps.ini ansible/playbooks/bootstrap-vps.yml
#
# personal-vps ansible_host=203.0.113.10 ansible_user=deploy
#
# To also open port 6443 for GitHub Actions or your admin IP:
# personal-vps ansible_host=203.0.113.10 ansible_user=deploy k3s_api_allowed_cidrs='["198.51.100.25/32"]'
