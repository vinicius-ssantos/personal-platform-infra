resources:
  - namespace.yaml
  - loki-config.yaml
  - loki-deployment.yaml
  - loki-service.yaml
  - alloy-rbac.yaml
  - alloy-config.yaml
  - alloy-deployment.yaml
  - grafana-datasources.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml

secretGenerator:
  - name: grafana-admin
    namespace: monitoring
    literals:
      # Local/k3d default only. VPS should replace this Secret from the encrypted secrets flow.
      - admin-user=admin
      - admin-password=admin

generatorOptions:
  disableNameSuffixHash: true
