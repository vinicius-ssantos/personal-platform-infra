apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
# Per-namespace Roles instead of a cluster-wide ClusterRole.
# Alloy is configured to discover pods only in these four namespaces
# (see alloy-config.yaml); no cluster-level resource access is needed.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-pod-logs
  namespace: mcp
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-pod-logs
  namespace: mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy-pod-logs
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
