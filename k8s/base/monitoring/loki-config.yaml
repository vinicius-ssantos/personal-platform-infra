apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  config.yaml: |
    # auth_enabled: false is acceptable for this single-tenant deployment.
    # Loki port 3100 is restricted by NetworkPolicy to pods within the monitoring
    # namespace only (see k8s/base/networkpolicies.yaml allow-loki-from-monitoring).
    # Enabling multi-tenant auth would require Alloy to send X-Scope-OrgID headers
    # and adds operational overhead without security benefit in this topology.
    auth_enabled: false

    server:
      http_listen_port: 3100

    common:
      path_prefix: /loki
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/index_cache
      filesystem:
        directory: /loki/chunks

    limits_config:
      allow_structured_metadata: false
      retention_period: 168h

    compactor:
      working_directory: /loki/compactor
      retention_enabled: true
      delete_request_store: filesystem
