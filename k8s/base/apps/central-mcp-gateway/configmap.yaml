apiVersion: v1
kind: ConfigMap
metadata:
  name: central-mcp-gateway-config
  namespace: mcp
data:
  GATEWAY_APP_NAME: central-mcp-gateway
  GATEWAY_HOST: 0.0.0.0
  GATEWAY_PORT: "8080"
  GATEWAY_LOG_LEVEL: info
  GATEWAY_OAUTH_CLIENT_ID: chatgpt
  GATEWAY_OAUTH_DEFAULT_SCOPES: gateway:read github:read github:write deploy:read social:read social:write sandbox:run repo:read repo-research:read vos:read vos:write
  # Tools exposed via the static proxy in every environment (local k3d + VPS).
  # Discovery tools (gateway.search_discovered_tools / get / invoke / propose) are intentionally
  # excluded from here: they expose the full upstream catalog and dynamic invocation, which widens
  # the attack surface in production. They are available in local Compose via .env.example only.
  # Higgsfield and sandbox upstreams are also local-only (no URL/token injected in k8s overlays).
  GATEWAY_TOOL_ALLOWLIST: gateway.status,gateway.delivery_status,gateway.upstream_capabilities,github.server_info,github.github_get_me,github.knowledge_search,github.tool_usage_guide,github.search_issues,github.ref_get,github.label_list,deploy.get_status,deploy.repo_analyze,deploy.policy_evaluate,deploy.render_service_plan,social.create_draft,social.publish_post,social.get_post_status,social.get_post_metrics,social.list_scheduled_posts,social.cancel_scheduled_post,social.update_post_caption,social.get_instagram_account_health,vos.get_studio_status,vos.list_sprints,vos.get_sprint_status,vos.list_sprint_assets,vos.get_operation_status,sandbox.run_code,sandbox.run_command,sandbox.run_file,repo.search,repo.fetch,repo.repository_overview,repo.list_files
  GATEWAY_UPSTREAM_GITHUB_URL: http://github-unified-mcp.mcp.svc.cluster.local:8765/mcp
  GATEWAY_UPSTREAM_DEPLOY_URL: http://deploy-orchestrator-mcp.mcp.svc.cluster.local:8000/mcp
  GATEWAY_UPSTREAM_SOCIAL_URL: http://mcp-social.mcp.svc.cluster.local:8080/mcp
  GATEWAY_UPSTREAM_VOS_URL: http://vos-studio-mcp.vos.svc.cluster.local:8000/mcp
  GATEWAY_UPSTREAM_REPO_RESEARCH_URL: http://repo-research-sidecar.mcp.svc.cluster.local:8081/mcp
  GATEWAY_RATE_LIMIT_PER_TOOL_PER_MINUTE: "20"
  GATEWAY_TRUSTED_PROXY_COUNT: "1"
  GATEWAY_IDEMPOTENCY_TTL_SECONDS: "300"
  GATEWAY_REDIS_URL: redis://redis:6379/0
  # GATEWAY_ENVIRONMENT, GATEWAY_PUBLIC_BASE_URL and GATEWAY_OAUTH_ISSUER (plus the
  # local-only GATEWAY_ADMIN_* / GATEWAY_DYNAMIC_UPSTREAMS_ENABLED) are
  # environment-specific and are set by the overlay:
  # runtime-env-local.yaml (dev) / runtime-env-vps.yaml (prod).
