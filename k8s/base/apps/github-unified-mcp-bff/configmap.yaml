apiVersion: v1
kind: ConfigMap
metadata:
  name: github-unified-mcp-bff-config
  namespace: bff
data:
  MCP_URL: "http://github-unified-mcp.mcp.svc.cluster.local:8765"
  # BFF_ENV, COOKIE_SECURE and FRONTEND_URL are environment-specific and are set
