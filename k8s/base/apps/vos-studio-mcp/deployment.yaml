apiVersion: apps/v1
kind: Deployment
metadata:
  name: vos-studio-mcp
  namespace: vos
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vos-studio-mcp
  template:
    metadata:
      labels:
        app: vos-studio-mcp
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: vos-studio-mcp
          image: ghcr.io/vinicius-ssantos/vos-studio-mcp:main
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vos-studio-mcp-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: DATABASE_URL
            - name: STORAGE_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: STORAGE_ENDPOINT
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: STORAGE_BUCKET
            - name: STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: STORAGE_ACCESS_KEY
            - name: STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: STORAGE_SECRET_KEY
            - name: STORAGE_PUBLIC_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: STORAGE_PUBLIC_BASE_URL
            - name: SOCIAL_MCP_ENABLED
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SOCIAL_MCP_ENABLED
            - name: SOCIAL_MCP_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SOCIAL_MCP_URL
            - name: SOCIAL_MCP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: SOCIAL_MCP_ACCESS_TOKEN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: VOS_REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: VOS_CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: VOS_CELERY_RESULT_BACKEND
            - name: HIGGSFIELD_MCP_ENABLED
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HIGGSFIELD_MCP_ENABLED
            - name: HIGGSFIELD_MCP_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HIGGSFIELD_MCP_ACCESS_TOKEN
            - name: HIGGSFIELD_FACADE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: HIGGSFIELD_FACADE_URL
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            timeoutSeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            timeoutSeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
