apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-mcp-config
  namespace: vos
data:
  MCP_SERVER_HOST: 0.0.0.0
  MCP_SERVER_PORT: "8000"
  PORT: "8000"
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  HIGGSFIELD_MCP_URL: https://mcp.higgsfield.ai/mcp
  # APP_ENV is environment-specific and is set by the overlay:
  # runtime-env-local.yaml (dev) / runtime-env-vps.yaml (prod).
