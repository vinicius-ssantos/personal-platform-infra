---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcp-social-backup
  namespace: mcp
spec:
  # Daily at 03:00 UTC.
  schedule: "0 3 * * *"
  # If the controller misses the window by more than 1h (node down, clock
  # skew), skip the run instead of firing late at an arbitrary time.
  startingDeadlineSeconds: 3600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # No automatic retries: a failure still restores replicas via the EXIT
      # trap, but fires a Grafana alert. Trigger a manual re-run after
      # investigating:
      #   kubectl create job --from=cronjob/mcp-social-backup manual-$(date +%Y%m%d) -n mcp
      backoffLimit: 0
      # Hard ceiling: covers even slow R2 uploads.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: mcp-social-backup
        spec:
          serviceAccountName: mcp-social-backup
          restartPolicy: Never
          terminationGracePeriodSeconds: 60
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          # Single container with EXIT/TERM/INT traps so replicas are restored
          # after normal backup failures. SIGKILL or forced pod deletion can
          # still bypass traps, so this is best-effort for hard termination.
          containers:
            - name: backup
              image: bitnami/kubectl:1.29.4
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: false
                capabilities:
                  drop:
                    - ALL
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail

                  PREV=$(kubectl get deployment mcp-social -n mcp \
                    -o jsonpath='{.spec.replicas}')

                  restore_replicas() {
                    echo "Restoring mcp-social to ${PREV:-0} replicas."
                    kubectl scale deployment mcp-social -n mcp \
                      --replicas="${PREV:-0}" || true
                  }

                  on_signal() {
                    restore_replicas
                    trap - EXIT TERM INT
                    exit 143
                  }

                  trap restore_replicas EXIT
                  trap on_signal TERM INT

                  echo "mcp-social replicas: $PREV — scaling to 0"
                  kubectl scale deployment mcp-social -n mcp --replicas=0
                  kubectl wait pod -l app=mcp-social -n mcp \
                    --for=delete --timeout=60s \
                    && echo "Pod terminated." \
                    || echo "No running pod found — proceeding."

                  RCLONE_VERSION="1.68.2"
                  RCLONE_ARCHIVE="rclone-v${RCLONE_VERSION}-linux-amd64.tar.gz"
                  RCLONE_BASE_URL="https://downloads.rclone.org/v${RCLONE_VERSION}"

                  wget -q -O "/tmp/${RCLONE_ARCHIVE}" \
                    "${RCLONE_BASE_URL}/${RCLONE_ARCHIVE}"
                  wget -q -O /tmp/SHA256SUMS "${RCLONE_BASE_URL}/SHA256SUMS"
                  grep -E "[ *]${RCLONE_ARCHIVE}$" /tmp/SHA256SUMS \
                    > "/tmp/${RCLONE_ARCHIVE}.sha256"
                  (cd /tmp && sha256sum -c "${RCLONE_ARCHIVE}.sha256")

                  tar xzf "/tmp/${RCLONE_ARCHIVE}" -C /tmp
                  cp "/tmp/rclone-v${RCLONE_VERSION}-linux-amd64/rclone" /tmp/rclone
                  chmod 0755 /tmp/rclone

                  DATE=$(date +%Y-%m-%d)
                  DEST="r2:${R2_BUCKET}/mcp-social/${DATE}/"

                  echo "Backing up /data/social.db* → ${DEST}"
                  /tmp/rclone copy /data "${DEST}" \
                    --include "social.db*" \
                    --use-server-modtime \
                    --verbose

                  echo "Pruning snapshots older than 30 days..."
                  /tmp/rclone delete "r2:${R2_BUCKET}/mcp-social/" \
                    --min-age 31d \
                    --use-server-modtime \
                    --rmdirs \
                    --verbose

                  echo "Backup complete."

                  # Optional dead-man's-switch ping (healthchecks.io or similar).
                  if [ -n "${HEALTHCHECKS_BACKUP_URL:-}" ]; then
                    wget -q -T 10 -O /dev/null "$HEALTHCHECKS_BACKUP_URL" \
                      && echo "Pinged healthchecks endpoint." \
                      || echo "WARNING: healthchecks ping failed (backup itself succeeded)." >&2
                  fi
              env:
                - name: HEALTHCHECKS_BACKUP_URL
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: HEALTHCHECKS_BACKUP_URL
                      optional: true
                - name: RCLONE_CONFIG_R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_BUCKET
                - name: RCLONE_CONFIG_R2_TYPE
                  value: s3
                - name: RCLONE_CONFIG_R2_PROVIDER
                  value: Cloudflare
                - name: RCLONE_CONFIG_R2_ACL
                  value: private
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
                - name: RCLONE_CONFIG_R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_ACCESS_KEY_ID
                - name: RCLONE_CONFIG_R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_SECRET_ACCESS_KEY
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi

          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: mcp-social-data
                readOnly: true
