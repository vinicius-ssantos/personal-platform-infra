---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcp-social-backup
  namespace: mcp
spec:
  # Daily at 03:00 UTC.
  schedule: "0 3 * * *"
  # If the controller misses the window by more than 1h (node down, clock
  # skew), skip the run instead of firing late at an arbitrary time.
  startingDeadlineSeconds: 3600
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      # No automatic retries: a failure leaves mcp-social at replicas=0 and
      # fires a Grafana alert. Trigger a manual re-run after investigating:
      #   kubectl create job --from=cronjob/mcp-social-backup manual-$(date +%Y%m%d) -n mcp
      backoffLimit: 0
      # Hard ceiling: covers even slow R2 uploads.
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app: mcp-social-backup
        spec:
          serviceAccountName: mcp-social-backup
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            # Step 1 — scale mcp-social to 0.
            # Records the current replica count so step 3 can restore it.
            # With no writer on the PVC, the SQLite snapshot in step 2 is
            # guaranteed to be internally consistent.
            - name: scale-down
              image: bitnami/kubectl:1.29.4
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  PREV=$(kubectl get deployment mcp-social -n mcp \
                    -o jsonpath='{.spec.replicas}')
                  printf '%s' "$PREV" > /state/prev-replicas
                  echo "mcp-social replicas: $PREV — scaling to 0"
                  kubectl scale deployment mcp-social -n mcp --replicas=0
                  # Returns immediately if no pod matches (already at 0).
                  kubectl wait pod -l app=mcp-social -n mcp \
                    --for=delete --timeout=60s \
                    && echo "Pod terminated." \
                    || echo "No running pod found — proceeding."
              volumeMounts:
                - name: state
                  mountPath: /state
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi

            # Step 2 — copy SQLite files to R2.
            # The Deployment is at replicas=0; the PVC has no writer.
            # rclone/rclone runs as root by default; runAsNonRoot is omitted so
            # it can read the PVC files regardless of their ownership.
            - name: backup
              image: rclone/rclone:1.68.2
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  DATE=$(date +%Y-%m-%d)
                  DEST="r2:${R2_BUCKET}/mcp-social/${DATE}/"
                  echo "Backing up /data/social.db* → ${DEST}"
                  rclone copy /data "${DEST}" \
                    --include "social.db*" \
                    --use-server-modtime \
                    --verbose
                  echo "Pruning snapshots older than 30 days..."
                  rclone delete "r2:${R2_BUCKET}/mcp-social/" \
                    --min-age 31d \
                    --use-server-modtime \
                    --rmdirs \
                    --verbose
                  echo "Backup complete."
                  # Optional dead-man's-switch ping (healthchecks.io or similar).
                  # A missed daily ping raises an external alert even if the
                  # whole cluster (and Grafana with it) is down.
                  if [ -n "${HEALTHCHECKS_BACKUP_URL:-}" ]; then
                    wget -q -T 10 -O /dev/null "$HEALTHCHECKS_BACKUP_URL" \
                      && echo "Pinged healthchecks endpoint." \
                      || echo "WARNING: healthchecks ping failed (backup itself succeeded)." >&2
                  fi
              env:
                - name: HEALTHCHECKS_BACKUP_URL
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: HEALTHCHECKS_BACKUP_URL
                      optional: true
                - name: RCLONE_CONFIG_R2_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_ENDPOINT
                - name: R2_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_BUCKET
                - name: RCLONE_CONFIG_R2_TYPE
                  value: s3
                - name: RCLONE_CONFIG_R2_PROVIDER
                  value: Cloudflare
                - name: RCLONE_CONFIG_R2_ACL
                  value: private
                - name: RCLONE_CONFIG_R2_NO_CHECK_BUCKET
                  value: "true"
                - name: RCLONE_CONFIG_R2_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_ACCESS_KEY_ID
                - name: RCLONE_CONFIG_R2_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: platform-secrets
                      key: R2_SECRET_ACCESS_KEY
              volumeMounts:
                - name: data
                  mountPath: /data
                  readOnly: true
                - name: state
                  mountPath: /state
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi

          # Step 3 — restore replica count.
          # Runs only after both init containers succeed; skipped on any failure.
          containers:
            - name: scale-up
              image: bitnami/kubectl:1.29.4
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -euo pipefail
                  PREV=$(cat /state/prev-replicas 2>/dev/null || echo "0")
                  echo "Restoring mcp-social to ${PREV} replicas."
                  kubectl scale deployment mcp-social -n mcp --replicas="${PREV}"
                  echo "Done."
              volumeMounts:
                - name: state
                  mountPath: /state
              resources:
                requests:
                  cpu: 10m
                  memory: 32Mi
                limits:
                  cpu: 100m
                  memory: 64Mi

          volumes:
            - name: state
              emptyDir: {}
            - name: data
              persistentVolumeClaim:
                claimName: mcp-social-data
                readOnly: true
