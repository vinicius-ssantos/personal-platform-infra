# Minimal RBAC for the mcp-social-backup CronJob.
#
# The backup job needs to scale the mcp-social Deployment to 0 before copying
# the SQLite files (guaranteeing no writer holds the PVC) and back up afterwards.
# Permissions are scoped to a single Deployment by resourceNames to follow
# least-privilege.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-social-backup
  namespace: mcp
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mcp-social-backup
  namespace: mcp
rules:
  # Scale mcp-social to 0 before backup (and restore afterwards).
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    resourceNames: ["mcp-social"]
    verbs: ["get", "patch", "update"]
  # kubectl wait --for=delete pod -l app=mcp-social needs list + watch on pods.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-social-backup
  namespace: mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mcp-social-backup
subjects:
  - kind: ServiceAccount
    name: mcp-social-backup
    namespace: mcp
