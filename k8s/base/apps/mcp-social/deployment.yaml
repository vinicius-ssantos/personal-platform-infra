apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-social
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: mcp-social
  template:
    metadata:
      labels:
        app: mcp-social
    spec:
      containers:
        - name: mcp-social
          image: ghcr.io/vinicius-ssantos/mcp-social:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
