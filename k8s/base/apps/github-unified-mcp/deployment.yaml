apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-unified-mcp
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: github-unified-mcp
  template:
    metadata:
      labels:
        app: github-unified-mcp
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: github-unified-mcp
          image: ghcr.io/vinicius-ssantos/github-unified-mcp:main
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: github-unified-mcp-config
          env:
            - name: MCP_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: MCP_BEARER_TOKEN
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: GITHUB_TOKEN
          ports:
            - containerPort: 8765
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
