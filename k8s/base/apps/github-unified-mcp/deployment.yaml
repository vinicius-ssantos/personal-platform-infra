apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-unified-mcp
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: github-unified-mcp
  template:
    metadata:
      labels:
        app: github-unified-mcp
    spec:
      containers:
        - name: github-unified-mcp
          image: ghcr.io/vinicius-ssantos/github-unified-mcp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
