apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-unified-mcp
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: github-unified-mcp
  template:
    metadata:
      labels:
        app: github-unified-mcp
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: github-unified-mcp
          image: ghcr.io/vinicius-ssantos/github-unified-mcp:main
          imagePullPolicy: IfNotPresent
          env:
            - name: FASTMCP_HOST
              value: 0.0.0.0
            - name: FASTMCP_PORT
              value: "8765"
            - name: MCP_AUTH_ENABLED
              value: "true"
            - name: MCP_AUTH_MODE
              value: bearer
            - name: MCP_BEARER_TOKEN
              value: local-dev-token
            - name: GITHUB_TOKEN
              value: local-dev-token
            - name: GITHUB_READ_ONLY
              value: "true"
          ports:
            - containerPort: 8765
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
