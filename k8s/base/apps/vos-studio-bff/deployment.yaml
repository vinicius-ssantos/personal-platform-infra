apiVersion: apps/v1
kind: Deployment
metadata:
  name: vos-studio-bff
  namespace: bff
spec:
  replicas: 0
  selector:
    matchLabels:
      app: vos-studio-bff
  template:
    metadata:
      labels:
        app: vos-studio-bff
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: vos-studio-bff
          image: ghcr.io/vinicius-ssantos/vos-studio-bff:main
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vos-studio-bff-config
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
