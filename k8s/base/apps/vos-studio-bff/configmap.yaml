apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-bff-config
  namespace: bff
data:
  MCP_URL: http://vos-studio-mcp.vos.svc.cluster.local:8000
  PORT: "8000"
  # BFF_ENV, COOKIE_SECURE, FRONTEND_URL and ALLOWED_ORIGINS are environment-specific
  # and are set by the overlay: runtime-env-local.yaml (dev) / runtime-env-vps.yaml (prod).
