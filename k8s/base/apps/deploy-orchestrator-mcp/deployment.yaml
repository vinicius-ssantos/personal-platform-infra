apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-orchestrator-mcp
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: deploy-orchestrator-mcp
  template:
    metadata:
      labels:
        app: deploy-orchestrator-mcp
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: deploy-orchestrator-mcp
          image: ghcr.io/vinicius-ssantos/deploy-orchestrator-mcp:main
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_TRANSPORT
              value: http
            - name: PORT
              value: "8000"
            - name: MCP_SERVER_API_KEY
              value: local-dev-token
            - name: MCP_READ_ONLY
              value: "true"
            - name: MCP_REQUIRE_CONFIRMATION
              value: "true"
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 512Mi
