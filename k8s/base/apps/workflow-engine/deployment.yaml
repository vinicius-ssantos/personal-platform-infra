apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-engine
  namespace: mcp
spec:
  replicas: 0
  selector:
    matchLabels:
      app: workflow-engine
  template:
    metadata:
      labels:
        app: workflow-engine
    spec:
      serviceAccountName: platform-puller
      containers:
        - name: workflow-engine
          image: ghcr.io/vinicius-ssantos/workflow-engine:main
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: workflow-engine-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: WORKFLOW_ENGINE_DATABASE_URL
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: WORKFLOW_ENGINE_DATABASE_USERNAME
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: WORKFLOW_ENGINE_DATABASE_PASSWORD
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: WORKFLOW_ENGINE_REDIS_URL
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: WORKFLOW_ENGINE_KAFKA_BOOTSTRAP_SERVERS
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
