apiVersion: v1
kind: ServiceAccount
metadata:
  name: platform-puller
  namespace: mcp
# Only used for GHCR image pulls via imagePullSecrets; never calls the k8s API.
automountServiceAccountToken: false
imagePullSecrets:
  - name: ghcr-pull-secret
