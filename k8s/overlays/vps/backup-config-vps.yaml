# VPS overlay patch for the mcp-social backup ConfigMap.
#
# R2_ENDPOINT and R2_BUCKET carry __TOKEN__ placeholders that are substituted
# at deploy time by scripts/render-vps-overlay.sh using the R2_ENDPOINT and
# R2_BUCKET env vars (GitHub Actions repository variables).
#
# In GitHub Actions, set:
#   vars.R2_ENDPOINT  = https://<account-id>.r2.cloudflarestorage.com
#   vars.R2_BUCKET    = <bucket-name>
#
# For local testing:
#   R2_ENDPOINT=https://... R2_BUCKET=my-bucket scripts/render-vps-overlay.sh
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-social-backup-config
  namespace: mcp
data:
  R2_ENDPOINT: __R2_ENDPOINT__
  R2_BUCKET: __R2_BUCKET__
