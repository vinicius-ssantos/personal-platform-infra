# Ingress for VPS deployment (k3s + Traefik default ingress controller).
# Replace example.com with your actual domain in all host fields.
# Cloudflare proxies TLS; Traefik receives plain HTTP on port 80.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-ingress
  namespace: mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: mcp-github.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-unified-mcp
                port:
                  number: 8765
    - host: deploy-mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deploy-orchestrator-mcp
                port:
                  number: 8000
    - host: social-mcp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-social
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
