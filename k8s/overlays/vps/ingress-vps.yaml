# Ingress for VPS deployment (k3s + Traefik default ingress controller).
# Host fields use the __VPS_DOMAIN__ token; it is rendered to the real domain
# at deploy time from the VPS_DOMAIN variable (scripts/render-vps-overlay.sh).
# Cloudflare proxies TLS; Traefik receives plain HTTP on port 80.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-ingress
  namespace: mcp
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: mcp-github.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-unified-mcp
                port:
                  number: 8765
    - host: deploy-mcp.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: deploy-orchestrator-mcp
                port:
                  number: 8000
    - host: social-mcp.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-social
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bff-ingress
  namespace: bff
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: github-bff.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-unified-mcp-bff
                port:
                  number: 8000
    - host: vos-bff.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vos-studio-bff
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vos-ingress
  namespace: vos
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: vos-mcp.__VPS_DOMAIN__
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vos-studio-mcp
                port:
                  number: 8000
