  namespace: bff
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: github-bff.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: github-unified-mcp-bff
                port:
                  number: 8000
    - host: vos-bff.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vos-studio-bff
                port:
                  number: 8000
---
apiVersion: networking.k8s.io/v1
