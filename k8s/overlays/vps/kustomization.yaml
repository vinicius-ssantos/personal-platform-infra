resources:
  - ../../base
  - loki-pvc.yaml
  - ingress-vps.yaml
  # platform-secrets are NOT included here: kustomize cannot decrypt SOPS.
  # Apply them separately with `just k8s-vps-secrets` (decrypt + kubectl apply),
  # or imperatively — see platform-secrets-vps.yaml.example and docs/secrets.md.

patches:
  - path: loki-volume-patch.yaml
  - path: runtime-env-vps.yaml

# Digest pinning for VPS deployments (docs/image-pinning.md): the base keeps
# the development-friendly :main tag; this overlay rewrites every app image to
# an immutable digest. Renovate (docker:pinDigests + kubernetes manager) keeps
# these digests updated via PRs.
#
# Digests resolved from ghcr.io :main on 2026-06-12, refreshed 2026-06-18 for
# github-unified-mcp, deploy-orchestrator-mcp, mcp-social, central-mcp-gateway,
# vos-studio-mcp, and repo-research-mcp (ADR 0016 tool-contract rollout — see
# each repo's feat/adopt-mcp-tool-contract PR). github-unified-mcp-bff and
# vos-studio-bff are unchanged, still pinned to their 2026-06-12 digests.
#
# repo-research-mcp (deployed here as repo-research-sidecar) had no digest
# override before this change — it rode the base manifest's :main tag with
# imagePullPolicy: IfNotPresent, which would have kept serving a stale image
# indefinitely once the node had any :main image cached. Pinning it here closes
# that gap and brings it in line with the other five services' policy.
#
# workflow-engine: pinned 2026-06-19 after WorkflowEngine#91 (Redis env var
# binding fix) merged and republished :main — verified healthy
# (/actuator/health -> {"status":"UP"}) before pinning this digest.
images:
  - name: ghcr.io/vinicius-ssantos/github-unified-mcp
    digest: sha256:3e9b2c22a7cd531abda4c2e838f72f482ea28fcd37db62b9716e47e5461e9d8d
