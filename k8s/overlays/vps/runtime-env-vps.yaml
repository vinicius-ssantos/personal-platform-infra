# The __VPS_DOMAIN__ token is rendered to the real domain at deploy time from the
# VPS_DOMAIN variable (scripts/render-vps-overlay.sh).
# FRONTEND_URL is the origin of the SPA that calls each BFF (e.g. Cloudflare Pages URL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-unified-mcp-bff-config
  namespace: bff
data:
  BFF_ENV: "production"
  COOKIE_SECURE: "true"
  FRONTEND_URL: "https://studio.__VPS_DOMAIN__"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-bff-config
  namespace: bff
data:
  BFF_ENV: "production"
  FRONTEND_URL: "https://vos-studio.__VPS_DOMAIN__"
  ALLOWED_ORIGINS: "https://vos-studio.__VPS_DOMAIN__"
  COOKIE_SECURE: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-mcp-config
  namespace: vos
data:
  APP_ENV: "production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: central-mcp-gateway-config
  namespace: mcp
data:
  GATEWAY_ENVIRONMENT: "production"
  GATEWAY_PUBLIC_BASE_URL: "https://mcp-gateway.__VPS_DOMAIN__"
  GATEWAY_OAUTH_ISSUER: "https://mcp-gateway.__VPS_DOMAIN__"
