# Replace example.com with your actual domain before deploying to VPS.
# FRONTEND_URL is the origin of the SPA that calls each BFF (e.g. Cloudflare Pages URL).
apiVersion: v1
kind: ConfigMap
metadata:
  name: github-unified-mcp-bff-config
  namespace: bff
data:
  BFF_ENV: "production"
  COOKIE_SECURE: "true"
  FRONTEND_URL: "https://studio.example.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-bff-config
  namespace: bff
data:
  BFF_ENV: "production"
  FRONTEND_URL: "https://vos-studio.example.com"
  ALLOWED_ORIGINS: "https://vos-studio.example.com"
  COOKIE_SECURE: "true"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vos-studio-mcp-config
  namespace: vos
data:
  APP_ENV: "production"
