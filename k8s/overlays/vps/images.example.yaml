# Preferred — digest pinning:
#
# images:
#   - name: ghcr.io/vinicius-ssantos/github-unified-mcp
#     digest: sha256:<digest>
#
# Acceptable — commit SHA tag, when upstream publishing does not expose digests:
#
# images:
#   - name: ghcr.io/vinicius-ssantos/github-unified-mcp
#     newTag: <git-sha>
#
# To resolve the current digest of a :main image:
#
#   TOKEN=$(curl -fsSL "https://ghcr.io/token?scope=repository:vinicius-ssantos/<image>:pull" | jq -r .token)
#   curl -fsSL -o /dev/null -w '%header{docker-content-digest}' \
#     -H "Authorization: Bearer $TOKEN" \
#     -H "Accept: application/vnd.oci.image.index.v1+json" \
#     "https://ghcr.io/v2/vinicius-ssantos/<image>/manifests/main"
#
# Renovate (docker:pinDigests) opens PRs to refresh the pinned digests.
