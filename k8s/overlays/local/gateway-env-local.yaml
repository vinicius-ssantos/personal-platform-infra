apiVersion: v1
kind: ConfigMap
metadata:
  name: central-mcp-gateway-config
  namespace: mcp
data:
  GATEWAY_ENVIRONMENT: "local"
  GATEWAY_PUBLIC_BASE_URL: "http://localhost:18040"
  GATEWAY_OAUTH_ISSUER: "http://localhost:18040"
  GATEWAY_ADMIN_ENABLED: "true"
  GATEWAY_ADMIN_UI_ENABLED: "true"
  GATEWAY_DYNAMIC_UPSTREAMS_ENABLED: "true"
