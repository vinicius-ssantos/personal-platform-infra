apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: mcp
type: Opaque
stringData:
  GITHUB_TOKEN: local-dev-token
  MCP_BEARER_TOKEN: local-dev-token
  MCP_SERVER_API_KEY: local-dev-token
  SOCIAL_MCP_ACCESS_TOKEN: local-dev-token
  SANDBOX_API_KEY: local-dev-token
  REPO_RESEARCH_SIDECAR_API_KEY: local-dev-token
  REPO_RESEARCH_GITHUB_TOKEN: local-dev-token
  HIGGSFIELD_MCP_ACCESS_TOKEN: local-dev-token
  REPO_RESEARCH_ALLOWED_REPOSITORIES: '["vinicius-ssantos/repo-research-mcp","vinicius-ssantos/WorkflowEngine"]'
  R2_ENDPOINT: https://account.r2.cloudflarestorage.com
  R2_BUCKET: local-dev-bucket
  # WorkflowEngine — local dev defaults (point to localhost/postgres)
  WORKFLOW_ENGINE_DATABASE_URL: jdbc:postgresql://localhost:5432/workflow_engine
  WORKFLOW_ENGINE_DATABASE_USERNAME: workflow
  WORKFLOW_ENGINE_DATABASE_PASSWORD: workflow
  WORKFLOW_ENGINE_REDIS_URL: redis://localhost:6379
  WORKFLOW_ENGINE_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: bff
type: Opaque
stringData:
  MCP_TOKEN: local-dev-token
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: vos
type: Opaque
stringData:
  DATABASE_URL: postgresql+asyncpg://user:pass@localhost:5432/vos
  STORAGE_ENDPOINT: https://account.r2.cloudflarestorage.com
  STORAGE_BUCKET: vos-studio-assets
  STORAGE_ACCESS_KEY: change-me
  STORAGE_SECRET_KEY: change-me
  STORAGE_PUBLIC_BASE_URL: https://pub-example.r2.dev
  SOCIAL_MCP_ENABLED: "true"
  SOCIAL_MCP_URL: http://mcp-social.mcp.svc.cluster.local:8080/mcp
  SOCIAL_MCP_ACCESS_TOKEN: local-dev-token
  HIGGSFIELD_MCP_ENABLED: "true"
  HIGGSFIELD_MCP_ACCESS_TOKEN: local-dev-token
  HIGGSFIELD_FACADE_URL: http://higgsfield-facade.mcp.svc.cluster.local:8080/mcp
  VOS_REDIS_URL: redis://redis:6379/1
  VOS_CELERY_BROKER_URL: redis://redis:6379/1
  VOS_CELERY_RESULT_BACKEND: redis://redis:6379/1
