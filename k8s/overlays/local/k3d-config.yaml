apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: personal-platform
servers: 1
agents: 0
ports:
  - port: 8088:80
    nodeFilters:
      - loadbalancer
  - port: 8443:443
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
