apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: mcp-social
  namespace: mcp
spec:
  target:
    service: mcp-social
    port: 8080
  rules:
    - hosts:
        - social-mcp.example.com
  scalingMetric:
    requestRate:
      targetValue: 5
      window: 1m
      granularity: 1s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: mcp-social
  namespace: mcp
spec:
  scaleTargetRef:
    name: mcp-social
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 600
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda:9090
        interceptorRoute: mcp-social
