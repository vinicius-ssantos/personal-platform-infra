apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: vos-studio-mcp
  namespace: vos
spec:
  target:
    service: vos-studio-mcp
    port: 8000
  rules:
    - hosts:
        - vos-mcp.__VPS_DOMAIN__
  scalingMetric:
    requestRate:
      targetValue: 5
      window: 1m
      granularity: 1s
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vos-studio-mcp
  namespace: vos
spec:
  scaleTargetRef:
    name: vos-studio-mcp
  minReplicaCount: 0
  maxReplicaCount: 1
  cooldownPeriod: 600
  triggers:
    - type: external-push
      metadata:
        scalerAddress: keda-add-ons-http-external-scaler.keda:9090
        interceptorRoute: vos-studio-mcp
