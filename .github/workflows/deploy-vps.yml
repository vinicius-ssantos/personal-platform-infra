name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - "k8s/**"

permissions:
  contents: read

jobs:
  deploy:
    name: Apply k8s overlay to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.VPS_KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        run: kubectl cluster-info --request-timeout=10s

      - name: Apply VPS overlay
        run: kubectl apply -k k8s/overlays/vps

      - name: Show workload status
        run: kubectl get deployments -A
