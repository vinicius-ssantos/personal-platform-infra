name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - "k8s/**"

permissions:
  contents: read

jobs:
  deploy:
    name: Apply k8s overlay to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Check VPS kubeconfig secret
        id: kubeconfig
        env:
          VPS_KUBECONFIG: ${{ secrets.VPS_KUBECONFIG }}
        run: |
          if [ -z "$VPS_KUBECONFIG" ]; then
            echo "::notice::VPS_KUBECONFIG is not configured; skipping VPS deploy."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.configured == 'true'
        env:
          VPS_KUBECONFIG: ${{ secrets.VPS_KUBECONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$VPS_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Verify cluster connectivity
        if: steps.kubeconfig.outputs.configured == 'true'
        run: kubectl cluster-info --request-timeout=10s

      - name: Apply VPS overlay
        if: steps.kubeconfig.outputs.configured == 'true'
        run: kubectl apply -k k8s/overlays/vps

      - name: Wait for rollouts to complete
        if: steps.kubeconfig.outputs.configured == 'true'
        run: |
          kubectl get deployments -A --no-headers \
            -o custom-columns='NS:.metadata.namespace,NAME:.metadata.name,REPLICAS:.spec.replicas' \
            | awk '$3 > 0 {print $1 "/" $2}' \
            | while read ns_name; do
                ns="${ns_name%/*}"
                name="${ns_name#*/}"
                echo "Waiting for rollout: $name in $ns"
                kubectl rollout status deployment/"$name" -n "$ns" --timeout=120s
              done

      - name: Show workload status
        if: steps.kubeconfig.outputs.configured == 'true'
        run: kubectl get deployments -A
